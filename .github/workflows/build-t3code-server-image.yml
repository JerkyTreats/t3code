name: Build T3 Code Server Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/server/**"
      - "apps/web/**"
      - "assets/**"
      - "packages/**"
      - "patches/**"
      - "scripts/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "tsconfig.base.json"
      - "vite.config.ts"
      - ".dockerignore"
      - "docker/t3code-server.Dockerfile"
      - ".github/workflows/build-t3code-server-image.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/jerkytreats/t3code-server

jobs:
  build:
    name: Build and push server image
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::8}"
          date_tag="$(date -u +%Y%m%d)"
          image_tag="build-${date_tag}-${short_sha}"

          {
            echo "short_sha=${short_sha}"
            echo "image_tag=${image_tag}"
            echo "image=${IMAGE_NAME}:${image_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/t3code-server.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ env.IMAGE_NAME }}:main
            ${{ env.IMAGE_NAME }}:sha-${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image
        run: |
          echo "${{ steps.meta.outputs.image }}"
